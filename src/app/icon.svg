<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Minimalist Monochrome Theme matching globals.css (Zinc/Black) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" /> <!-- zinc-900 -->
      <stop offset="100%" stop-color="#09090b" /> <!-- zinc-950 -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <!-- Outer Squircle with subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="128" fill="url(#bg)" />
  <rect x="16" y="16" width="480" height="480" rx="128" fill="none" stroke="#27272a" stroke-width="4" />
  
  <g transform="translate(-29, -16)" filter="url(#shadow)">
    <!-- The "T" Monogram -->
    <path d="
      M 160 176 H 352
      M 256 176 V 368
    " fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- The Developer Dot "." -->
    <circle cx="410" cy="368" r="24" fill="#ffffff" />
  </g>
</svg>
